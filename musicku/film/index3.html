<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>胶片播放器 · 固定宽度面板</title>
  <link type="text/css" href="css/style.css" rel="stylesheet" />
  <style>
    /* ===== 全局重置与字体 ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      background: url(./img/page-bg.jpg) no-repeat 50%/100% 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Georgia', 'Times New Roman', 'Microsoft YaHei', serif;
      margin: 0;
      padding: 20px;
    }

    /* ===== 主容器 ===== */
    .player-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 20px 30px;
      max-width: 1100px;
      width: 100%;
      flex-wrap: wrap;
    }

    /* ===== 唱片区域 (完全保留原样) ===== */
    .btns-bg {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 653px;
      height: 653px;
      flex-shrink: 0;
      max-width: 70vw;
      max-height: 70vw;
    }
    .PlayEy {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      background: url(./img/bg_circle.png), url(./img/bg_center.png) no-repeat center;
      background-size: contain, auto;
    }
    .Btn {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 95px;
      height: 95px;
      background: url(./img/btn-bg.png) no-repeat;
      animation: Btn-bg 3s linear infinite;
      pointer-events: none;
    }
    .Play {
      position: absolute;
      width: 29px;
      height: 36px;
      background: url(img/pause.png) no-repeat center;
      background-size: contain;
      transition: .5s;
      cursor: pointer;
      z-index: 10;
    }
    @keyframes Btn-bg {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ===== 右侧控制面板 · 固定宽度 ===== */
    .control-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      /* 固定宽度，不随内容变化 */
      width: 260px;
      flex-shrink: 0;
      /* 毛玻璃效果：透明度60% + 模糊 */
      background: rgba(30, 24, 20, 0.60);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      border-radius: 52px;
      padding: 34px 24px 30px 24px;
      /* 立体感：多层边框 + 阴影 */
      border: 1px solid rgba(200, 175, 155, 0.25);
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(180, 150, 120, 0.15) inset,
        0 2px 0 rgba(255, 215, 180, 0.06) inset,
        0 -4px 12px rgba(0, 0, 0, 0.5) inset;
      position: relative;
      transition: box-shadow 0.3s ease;
    }
    /* 面板装饰纹理 */
    .control-panel::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border-radius: 44px;
      border: 1px solid rgba(200, 175, 155, 0.08);
      pointer-events: none;
      box-shadow: 0 0 20px rgba(0,0,0,0.2) inset;
    }
    /* 面板顶部装饰线 */
    .control-panel::after {
      content: '';
      position: absolute;
      top: 18px;
      left: 22%;
      right: 22%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 175, 155, 0.25), transparent);
      opacity: 0.6;
    }

    /* ===== 歌曲名称 (滚动) ===== */
    .panel-song-name {
      color: #f0e0d0;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 2px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9);
      text-align: center;
      padding: 6px 4px 12px 4px;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
      font-family: 'Georgia', serif;
      border-bottom: 1px solid rgba(200, 175, 155, 0.12);
      margin-bottom: 2px;
    }
    /* 滚动字幕 */
    .song-name-scroll {
      display: inline-block;
      padding-left: 100%;
      animation: scrollSong 14s linear infinite;
      animation-delay: 1s;
    }
    @keyframes scrollSong {
      0% { transform: translateX(0); }
      100% { transform: translateX(-200%); }
    }
    /* 暂停滚动 (当鼠标悬停时) */
    .panel-song-name:hover .song-name-scroll {
      animation-play-state: paused;
    }
    /* 如果文字较短则不需要滚动 */
    .panel-song-name .song-name-scroll.short {
      animation: none;
      padding-left: 0;
      display: block;
    }

    /* ===== 按钮网格: 正方形四角布局 ===== */
    .panel-buttons {
      display: grid;
      grid-template-columns: 76px 76px;
      grid-template-rows: 76px 76px;
      gap: 14px 20px;
      justify-content: center;
      align-items: center;
      padding: 6px 0 2px 0;
      flex-shrink: 0;
    }

    .panel-btn {
      background: rgba(45, 35, 28, 0.65);
      border: 1px solid rgba(180, 155, 135, 0.25);
      color: #dccfc4;
      font-size: 30px;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 
        0 6px 0 rgba(20, 15, 12, 0.5),
        0 8px 24px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 215, 180, 0.12),
        inset 0 -3px 0 rgba(0, 0, 0, 0.3);
      font-family: 'Georgia', serif;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      position: relative;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .panel-btn:hover {
      background: rgba(80, 60, 45, 0.6);
      border-color: rgba(200, 175, 155, 0.4);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 
        0 8px 0 rgba(20, 15, 12, 0.4),
        0 12px 32px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 215, 180, 0.2),
        inset 0 -3px 0 rgba(0, 0, 0, 0.2);
      color: #f5e6d3;
    }
    .panel-btn:active {
      transform: translateY(4px) scale(0.96);
      box-shadow: 
        0 2px 0 rgba(20, 15, 12, 0.5),
        0 4px 12px rgba(0, 0, 0, 0.4),
        inset 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    /* 模式按钮特殊样式 */
    .panel-btn.mode-btn {
      font-size: 24px;
      background: rgba(40, 30, 22, 0.7);
      border-color: rgba(160, 135, 115, 0.2);
    }
    .panel-btn.mode-btn.active {
      background: rgba(160, 120, 90, 0.3);
      border-color: rgba(200, 175, 155, 0.4);
      color: #f0dcc8;
      box-shadow: 
        0 6px 0 rgba(20, 15, 12, 0.5),
        0 8px 24px rgba(0, 0, 0, 0.5),
        0 0 30px rgba(200, 160, 130, 0.08),
        inset 0 1px 0 rgba(255, 215, 180, 0.15);
    }

    /* 播放/暂停按钮 (右下角) */
    .panel-btn.play-toggle {
      font-size: 34px;
      background: rgba(65, 48, 35, 0.7);
      border-color: rgba(180, 155, 135, 0.3);
      grid-column: 2 / 3;
      grid-row: 2 / 3;
    }
    .panel-btn.play-toggle:hover {
      background: rgba(120, 85, 60, 0.5);
      border-color: rgba(200, 175, 155, 0.45);
    }

    /* 四角摆放 */
    .panel-btn[data-action="prev"] { grid-column: 1; grid-row: 1; }
    .panel-btn[data-action="next"] { grid-column: 2; grid-row: 1; }
    .panel-btn[data-action="mode"] { grid-column: 1; grid-row: 2; }
    .panel-btn[data-action="play"] { grid-column: 2; grid-row: 2; }

    /* ===== 响应式 ===== */
    @media (max-width: 850px) {
      .player-container {
        flex-direction: column;
        gap: 24px;
        padding: 10px;
      }
      .btns-bg {
        max-width: 80vw;
        max-height: 80vw;
        width: auto;
        height: auto;
        aspect-ratio: 1/1;
      }
      .control-panel {
        width: 92%;
        max-width: 360px;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        padding: 18px 22px 22px 22px;
        border-radius: 36px;
        gap: 10px;
      }
      .panel-song-name {
        font-size: 16px;
        border-bottom: none;
        padding-bottom: 6px;
        width: 100%;
        flex: 0 0 100%;
        text-align: center;
        margin-bottom: 0;
      }
      .panel-buttons {
        grid-template-columns: 60px 60px;
        grid-template-rows: 60px 60px;
        gap: 10px 16px;
      }
      .panel-btn {
        font-size: 24px;
        border-radius: 14px;
      }
      .panel-btn.play-toggle {
        font-size: 28px;
      }
      .panel-btn.mode-btn {
        font-size: 20px;
      }
      .control-panel::after {
        display: none;
      }
    }
    @media (max-width: 480px) {
      .control-panel {
        padding: 12px 14px 16px 14px;
        border-radius: 28px;
        max-width: 300px;
      }
      .panel-buttons {
        grid-template-columns: 52px 52px;
        grid-template-rows: 52px 52px;
        gap: 8px 12px;
      }
      .panel-btn {
        font-size: 20px;
        border-radius: 12px;
      }
      .panel-btn.play-toggle {
        font-size: 24px;
      }
      .panel-song-name {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<div class="player-container">
  <!-- ===== 唱片 ===== -->
  <div class="btns-bg">
    <div class="PlayEy"></div>
    <div class="Btn"></div>
    <div class="Play" id="playBtn">
      <audio id="audios" preload="metadata"></audio>
    </div>
  </div>

  <!-- ===== 右侧控制面板 (固定宽度) ===== -->
  <div class="control-panel">
    <!-- 歌曲名称 (滚动) -->
    <div class="panel-song-name" id="songNameContainer">
      <span class="song-name-scroll" id="currentSongName">🎵 加载中...</span>
    </div>

    <!-- 四角按钮布局 -->
    <div class="panel-buttons">
      <button class="panel-btn" data-action="prev" id="prevBtn" title="上一首">⏮</button>
      <button class="panel-btn" data-action="next" id="nextBtn" title="下一首">⏭</button>
      <button class="panel-btn mode-btn" data-action="mode" id="modeBtn" title="播放模式">🔁</button>
      <button class="panel-btn play-toggle" data-action="play" id="playToggleBtn" title="播放 / 暂停">▶</button>
    </div>
  </div>
</div>

<!-- 引入音乐列表 -->
<script type="text/javascript" src="js/music.js"></script>
<script type="text/javascript">
  (function() {
    // ---------- DOM ----------
    var oPlayEy = document.querySelector('.PlayEy');
    var oPlay = document.getElementById('playBtn');
    var audios = document.getElementById('audios');
    var songNameSpan = document.getElementById('currentSongName');
    var songContainer = document.getElementById('songNameContainer');
    var prevBtn = document.getElementById('prevBtn');
    var nextBtn = document.getElementById('nextBtn');
    var modeBtn = document.getElementById('modeBtn');
    var playToggleBtn = document.getElementById('playToggleBtn');

    // ---------- 音乐数据 ----------
    var musicData = window.musicList || [];
    if (!musicData.length) {
      console.warn('music.js 未加载');
      songNameSpan.textContent = '⚠️ 无音乐列表';
      songNameSpan.classList.add('short');
    }

    // ---------- 状态 ----------
    var currentIndex = 0;
    var currentSong = musicData.length ? musicData[0] : null;
    var isPlaying = false;
    var rotateInterval = null;
    var rotateDeg = 0;

    // 播放模式: 0-顺序, 1-单曲, 2-随机
    var playMode = 0;
    var modeIcons = ['🔁', '🔂', '🎲'];
    var modeLabels = ['顺序循环', '单曲循环', '随机播放'];

    // ---------- 辅助: 更新歌曲名称滚动状态 ----------
    function updateSongNameScroll(text) {
      songNameSpan.textContent = text || '🎵 未知歌曲';
      // 检查文字长度，如果短则取消滚动
      if (songNameSpan.textContent.length < 14) {
        songNameSpan.classList.add('short');
      } else {
        songNameSpan.classList.remove('short');
      }
      // 重置动画
      songNameSpan.style.animation = 'none';
      void songNameSpan.offsetWidth;
      songNameSpan.style.animation = '';
    }

    // ---------- 核心函数 ----------
    function loadSongByIndex(index) {
      if (!musicData.length) {
        updateSongNameScroll('⚠️ 无音乐');
        return;
      }
      if (index < 0) index = musicData.length - 1;
      if (index >= musicData.length) index = 0;
      var song = musicData[index];
      if (!song || !song.url) return;
      currentIndex = index;
      currentSong = song;
      audios.src = song.url;
      var displayName = '🎵 ' + (song.name || '未知歌曲');
      updateSongNameScroll(displayName);
      if (isPlaying) {
        audios.play().catch(function(e) {});
        startRotation();
      } else {
        stopRotation();
      }
    }

    function togglePlay() {
      if (!musicData.length) return;
      if (!audios.src || audios.src === '') {
        if (musicData[currentIndex]) {
          audios.src = musicData[currentIndex].url;
          updateSongNameScroll('🎵 ' + (musicData[currentIndex].name || '未知'));
        } else {
          return;
        }
      }

      if (audios.paused) {
        audios.play().catch(function(e) { console.warn('播放失败', e); });
        isPlaying = true;
        startRotation();
        oPlay.style.backgroundImage = "url(img/play.png)";
        oPlay.style.width = "32px";
        oPlay.style.height = "32px";
        playToggleBtn.textContent = '⏸';
      } else {
        audios.pause();
        isPlaying = false;
        stopRotation();
        oPlay.style.backgroundImage = "url(img/pause.png)";
        oPlay.style.width = "29px";
        oPlay.style.height = "36px";
        playToggleBtn.textContent = '▶';
      }
    }

    function startRotation() {
      if (rotateInterval) return;
      rotateInterval = setInterval(function() {
        rotateDeg = (rotateDeg + 1) % 360;
        oPlayEy.style.transform = "rotate(" + rotateDeg + "deg)";
        if (audios.paused) {
          stopRotation();
        }
      }, 30);
    }

    function stopRotation() {
      if (rotateInterval) {
        clearInterval(rotateInterval);
        rotateInterval = null;
      }
    }

    function nextSong() {
      if (!musicData.length) return;
      var nextIdx = currentIndex;
      if (playMode === 0) {
        nextIdx = (currentIndex + 1) % musicData.length;
      } else if (playMode === 1) {
        nextIdx = currentIndex;
      } else if (playMode === 2) {
        var randomIdx;
        do {
          randomIdx = Math.floor(Math.random() * musicData.length);
        } while (musicData.length > 1 && randomIdx === currentIndex);
        nextIdx = randomIdx;
      }
      loadSongByIndex(nextIdx);
      if (isPlaying) {
        audios.play().catch(function(e) {});
        startRotation();
        oPlay.style.backgroundImage = "url(img/play.png)";
        oPlay.style.width = "32px";
        oPlay.style.height = "32px";
        playToggleBtn.textContent = '⏸';
      } else {
        stopRotation();
        playToggleBtn.textContent = '▶';
      }
    }

    function prevSong() {
      if (!musicData.length) return;
      var prevIdx = currentIndex;
      if (playMode === 0) {
        prevIdx = (currentIndex - 1 + musicData.length) % musicData.length;
      } else if (playMode === 1) {
        prevIdx = currentIndex;
      } else if (playMode === 2) {
        var randomIdx;
        do {
          randomIdx = Math.floor(Math.random() * musicData.length);
        } while (musicData.length > 1 && randomIdx === currentIndex);
        prevIdx = randomIdx;
      }
      loadSongByIndex(prevIdx);
      if (isPlaying) {
        audios.play().catch(function(e) {});
        startRotation();
        oPlay.style.backgroundImage = "url(img/play.png)";
        oPlay.style.width = "32px";
        oPlay.style.height = "32px";
        playToggleBtn.textContent = '⏸';
      } else {
        stopRotation();
        playToggleBtn.textContent = '▶';
      }
    }

    function cycleMode() {
      playMode = (playMode + 1) % 3;
      modeBtn.textContent = modeIcons[playMode];
      modeBtn.title = modeLabels[playMode];
      modeBtn.classList.toggle('active', playMode !== 0);
      console.log('播放模式:', modeLabels[playMode]);
    }

    // ---------- 事件绑定 ----------
    oPlay.onclick = function(e) {
      e.stopPropagation();
      togglePlay();
    };
    playToggleBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      togglePlay();
    });
    prevBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      prevSong();
    });
    nextBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      nextSong();
    });
    modeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      cycleMode();
    });

    // 播放结束自动下一首
    audios.addEventListener('ended', function() {
      if (playMode === 1) {
        audios.currentTime = 0;
        audios.play().catch(function(e) {});
        return;
      }
      nextSong();
    });

    // 监听播放/暂停状态 (同步UI)
    audios.addEventListener('play', function() {
      isPlaying = true;
      startRotation();
      oPlay.style.backgroundImage = "url(img/play.png)";
      oPlay.style.width = "32px";
      oPlay.style.height = "32px";
      playToggleBtn.textContent = '⏸';
    });
    audios.addEventListener('pause', function() {
      isPlaying = false;
      stopRotation();
      oPlay.style.backgroundImage = "url(img/pause.png)";
      oPlay.style.width = "29px";
      oPlay.style.height = "36px";
      playToggleBtn.textContent = '▶';
    });

    // ---------- 初始化 ----------
    if (musicData.length) {
      loadSongByIndex(0);
      isPlaying = false;
      oPlay.style.backgroundImage = "url(img/pause.png)";
      oPlay.style.width = "29px";
      oPlay.style.height = "36px";
      playToggleBtn.textContent = '▶';
      modeBtn.textContent = modeIcons[playMode];
      modeBtn.title = modeLabels[playMode];
      modeBtn.classList.remove('active');
    } else {
      updateSongNameScroll('⚠️ 请检查 music.js');
      oPlay.style.backgroundImage = "url(img/pause.png)";
      playToggleBtn.textContent = '▶';
    }

    window.__player = {
      play: togglePlay,
      next: nextSong,
      prev: prevSong,
      mode: cycleMode,
      list: musicData
    };
    console.log('🎵 固定宽度面板启动, 歌曲数:', musicData.length);
  })();
</script>
</body>
</html>
