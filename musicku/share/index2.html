<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="听松阁歌曲在线播放，歌曲下载，专辑合集">
    <meta name="keywords" content="听松阁，下载，南京，民谣，摇滚，歌曲">
    <meta name="author" content="听松阁">
    <meta name="robots" content="all">
    <title>听松阁 · 移动优化</title>
    <link rel="stylesheet" href="./css/all.min.css">
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #app {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
        }

        body {
            background: #111827;
            color: #fff;
            padding: 16px;
            background-image: url('https://img10.360buyimg.com/ddimg/jfs/t1/453252/16/14264/106854/6a37426aF81bc450f/00155a036eee5406.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
        }

        /* ===== 背景光晕 ===== */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(120, 80, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(255, 80, 120, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 2px;
        }

        /* ===== 顶部导航 ===== */
        .top-nav {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 10px 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
        }

        .top-nav .logo {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }
        .top-nav .logo span { color: rgba(255,255,255,0.4); font-weight: 300; }
        .top-nav .logo i { margin-right: 8px; color: #8b7cf7; }

        .top-nav .github-link {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.04);
            transition: 0.3s;
        }
        .top-nav .github-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.06);
        }

        /* ===== 主容器 — 移动优先：列表突出，分类紧凑 ===== */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: calc(100% - 56px - 90px);
            padding: 10px 0 0 0;
            gap: 10px;
            overflow: hidden;
        }

        /* ===== 歌曲面板 — 毛玻璃，占据大部分空间 ===== */
        .song-panel {
            flex: 1;
            min-height: 0;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .panel-header {
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.01);
        }
        .panel-title {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
        }
        .song-count {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.03);
            padding: 2px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .song-list {
            flex: 1;
            overflow-y: auto;
            padding: 2px 0;
        }
        .song-item {
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
            border-left: 3px solid transparent;
            margin: 1px 6px;
            border-radius: 8px;
        }
        .song-item:hover { background: rgba(255,255,255,0.03); }
        .song-item.active {
            background: rgba(139, 124, 247, 0.12);
            border-left-color: #8b7cf7;
        }
        .song-item .index {
            color: rgba(255,255,255,0.12);
            font-size: 11px;
            min-width: 24px;
            text-align: right;
        }
        .song-item.active .index { color: #8b7cf7; }
        .song-item .song-name {
            flex: 1;
            color: rgba(255,255,255,0.55);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-item.active .song-name { color: #fff; font-weight: 500; }
        .song-item .playing-icon {
            display: none;
            color: #8b7cf7;
            font-size: 13px;
            animation: pulse 1.2s infinite;
        }
        .song-item.active .playing-icon { display: flex; }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }
        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.1);
            padding: 60px 20px;
            font-size: 14px;
        }
        .empty-state i { display: block; margin-bottom: 12px; font-size: 40px; color: rgba(255,255,255,0.03); }

        /* ===== 右侧分类区域 — 紧凑，水平排列 ===== */
        .right-panel {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
            max-height: 150px;
            min-height: 80px;
        }

        .category-grid {
            flex: 1;
            min-width: 160px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-height: 150px;
        }

        .category-grid-title {
            font-size: 10px;
            color: rgba(255,255,255,0.15);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 0 0 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            margin-bottom: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .category-grid-title i { color: #8b7cf7; }

        /* 分类网格 — 紧凑 4列 */
        .category-grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            flex: 1;
            align-content: start;
            overflow-y: auto;
        }

        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 4px 2px;
            border-radius: 10px;
            transition: 0.3s;
            border: 1px solid transparent;
            gap: 2px;
        }
        .category-item:hover {
            background: rgba(255,255,255,0.03);
            transform: translateY(-1px);
        }
        .category-item.active {
            background: rgba(139, 124, 247, 0.08);
            border-color: rgba(139, 124, 247, 0.1);
        }
        .category-item img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.03);
            transition: 0.3s;
        }
        .category-item.active img {
            border-color: rgba(139, 124, 247, 0.3);
            box-shadow: 0 0 20px rgba(139,124,247,0.05);
        }
        .category-item .cat-name {
            font-size: 8px;
            color: rgba(255,255,255,0.25);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            line-height: 1.2;
        }
        .category-item.active .cat-name {
            color: rgba(255,255,255,0.7);
        }

        /* 下载链接 — 紧凑 */
        .download-link {
            flex: 0 0 auto;
            min-width: 70px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        .download-link a {
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.3s;
        }
        .download-link a:hover { color: #8b7cf7; }

        /* ===== 底部播放器 ===== */
        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            gap: 12px;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.12);
        }

        .player-song-info {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 120px;
            flex-shrink: 0;
        }
        .song-cover {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .song-cover img { width: 100%; height: 100%; object-fit: cover; }
        .song-title {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .song-artist { font-size: 11px; color: rgba(255,255,255,0.15); margin-top: 1px; }

        .player-controls-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 0;
            max-width: 500px;
        }
        .control-buttons {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            font-size: 16px;
            padding: 4px 6px;
            border-radius: 50%;
            transition: 0.3s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.03); }
        .ctrl-btn.active { color: #8b7cf7; }
        .play-btn {
            width: 40px;
            height: 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #8b7cf7, #a78bfa);
            color: #fff;
            box-shadow: 0 4px 20px rgba(139, 124, 247, 0.25);
        }
        .play-btn:hover { transform: scale(1.04); }

        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .time-current, .time-duration {
            font-size: 10px;
            color: rgba(255,255,255,0.12);
            min-width: 30px;
        }
        .progress-bar {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.04);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar:hover { height: 4px; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b7cf7, #a78bfa);
            border-radius: 2px;
            width: 0%;
            transition: width 0.05s linear;
        }
        .progress-dot {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            border: 2px solid #8b7cf7;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .progress-bar:hover .progress-dot { opacity: 1; }

        .player-controls-right {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 80px;
            flex-shrink: 0;
        }
        .volume-bar {
            width: 48px;
            height: 3px;
            background: rgba(255,255,255,0.04);
            border-radius: 2px;
            cursor: pointer;
        }
        .volume-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b7cf7, #a78bfa);
            border-radius: 2px;
            width: 100%;
            transition: width 0.1s;
        }

        .play-mode-tip {
            position: fixed;
            bottom: 105px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.7);
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        .play-mode-tip.show { opacity: 1; }

        /* ===== 桌面端微调 ===== */
        @media (min-width: 769px) {
            .main-container {
                flex-direction: row;
                padding: 16px 40px 16px 40px;
                height: calc(100% - 64px - 100px);
                gap: 16px;
            }
            .right-panel {
                flex-direction: column;
                max-height: 100%;
                width: 240px;
                flex-shrink: 0;
            }
            .category-grid {
                max-height: 100%;
                flex: 1;
            }
            .category-grid-container {
                grid-template-columns: repeat(3, 1fr);
            }
            .download-link {
                min-height: 44px;
            }
            .top-nav {
                height: 64px;
                padding: 12px 40px;
                border-radius: 0;
            }
            .player {
                height: 100px;
                padding: 16px 40px;
            }
            body { padding: 0; }
        }

        @media (max-width: 480px) {
            .top-nav { height: 48px; padding: 6px 12px; }
            .top-nav .logo { font-size: 14px; }
            .top-nav .github-link { font-size: 10px; padding: 2px 8px; }
            .main-container { height: calc(100% - 48px - 80px); padding: 6px 0 0 0; gap: 6px; }
            .right-panel { max-height: 120px; min-height: 60px; gap: 4px; }
            .category-grid { max-height: 120px; padding: 6px 8px; }
            .category-grid-container { grid-template-columns: repeat(4, 1fr); gap: 2px; }
            .category-item img { width: 28px; height: 28px; }
            .category-item .cat-name { font-size: 7px; }
            .download-link { min-width: 50px; padding: 4px 8px; }
            .download-link a { font-size: 9px; }
            .player { height: 80px; padding: 8px 12px; gap: 6px; }
            .player-song-info { min-width: 80px; gap: 6px; }
            .song-cover { width: 32px; height: 32px; }
            .song-title { font-size: 11px; }
            .ctrl-btn { width: 26px; height: 26px; font-size: 13px; }
            .play-btn { width: 34px; height: 34px; font-size: 15px; }
            .volume-bar { width: 30px; }
            .time-current, .time-duration { font-size: 9px; min-width: 24px; }
            .panel-header { padding: 6px 12px; }
            .panel-title { font-size: 13px; }
            .song-item { padding: 6px 12px; }
            .song-item .song-name { font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- 顶部导航 -->
    <div class="top-nav">
        <div class="logo"><i class="fas fa-headphones"></i>听松<span>阁</span></div>
        <a class="github-link" target="_blank" href="https://github.com/JiangZhaojin/ByeByeLiZhi/tree/master/music">
            <i class="fab fa-github"></i> 下载
        </a>
    </div>

    <!-- 主内容 -->
    <div class="main-container">
        <!-- 歌曲列表 (突出) -->
        <div class="song-panel" id="songPanel">
            <div class="panel-header">
                <div class="panel-title-wrapper">
                    <button class="back-btn" id="backBtn" style="display:none; background:rgba(255,255,255,0.03); border:none; color:rgba(255,255,255,0.4); padding:2px 10px; border-radius:8px; cursor:pointer;">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <span class="panel-title" id="categoryTitle">选择分类</span>
                </div>
                <span class="song-count" id="songCount"></span>
            </div>
            <div class="song-list" id="songList">
                <div class="empty-state"><i class="fas fa-music"></i><p>点击下方分类查看歌曲</p></div>
            </div>
        </div>

        <!-- 分类区域 (紧凑) -->
        <div class="right-panel">
            <div class="category-grid" id="categoryGrid">
                <div class="category-grid-title"><i class="fas fa-th-large"></i> 分类</div>
                <div class="category-grid-container" id="categoryContainer"></div>
            </div>
            <div class="download-link">
                <a target="_blank" href="https://github.com/JiangZhaojin/ByeByeLiZhi/tree/master/music">
                    <i class="fab fa-github"></i> 下载
                </a>
            </div>
        </div>
    </div>

    <!-- 播放器 -->
    <div class="player" id="player">
        <div class="player-song-info">
            <div class="song-cover" id="songCover"><img src="./music/china.jpg" alt="cover" id="coverImg"></div>
            <div class="song-meta">
                <div class="song-title" id="currentSongName">选择歌曲</div>
                <div class="song-artist">听松阁</div>
            </div>
        </div>

        <div class="player-controls-center">
            <div class="control-buttons">
                <button class="ctrl-btn" id="shuffleBtn" title="随机"><i class="fas fa-random"></i></button>
                <button class="ctrl-btn" id="prevBtn" title="上一首"><i class="fas fa-step-backward"></i></button>
                <button class="ctrl-btn play-btn" id="playBtn" title="播放"><i class="fas fa-play"></i></button>
                <button class="ctrl-btn" id="nextBtn" title="下一首"><i class="fas fa-step-forward"></i></button>
                <button class="ctrl-btn" id="repeatBtn" title="模式"><i class="fas fa-redo"></i></button>
            </div>
            <div class="progress-wrapper">
                <span class="time-current" id="currentTime">00:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    <div class="progress-dot" id="progressDot" style="left:0%"></div>
                </div>
                <span class="time-duration" id="duration">00:00</span>
            </div>
        </div>

        <div class="player-controls-right">
            <button class="ctrl-btn" id="volumeBtn" title="静音"><i class="fas fa-volume-up"></i></button>
            <div class="volume-bar" id="volumeBar">
                <div class="volume-fill" id="volumeFill" style="width:100%"></div>
            </div>
        </div>
        <audio id="audioPlayer"></audio>
    </div>

    <div class="play-mode-tip" id="playModeTip"></div>
</div>

<!-- ===== 数据加载 ===== -->
<script>
window.__categoryMetaData = [
    { category: 1, name: "国语精选", cover: "./music/china.jpg", file: "playlist-category-1.js" },
    { category: 2, name: "欧美经典", cover: "./music/usa.jpg", file: "playlist-category-2.js" },
    { category: 3, name: "空灵轻音乐", cover: "./music/kong.jpg", file: "playlist-category-3.js" },
    { category: 4, name: "韩语流行", cover: "./music/korea.jpg", file: "playlist-category-4.js" },
    { category: 5, name: "日语流行", cover: "./music/japan.jpg", file: "playlist-category-5.js" },
    { category: 6, name: "泰国音乐", cover: "./music/thailand.jpg", file: "playlist-category-6.js" },
    { category: 7, name: "自然之声", cover: "./music/ziran.jpg", file: "playlist-category-7.js" },
    { category: 8, name: "唯美纯音乐", cover: "./music/weimei.jpg", file: "playlist-category-8.js" },
    { category: 9, name: "周深", cover: "./music/zhoushen.jpg", file: "playlist-category-9.js" },
    { category: 10, name: "洋澜一", cover: "./music/yanglanyi.jpg", file: "playlist-category-10.js" },
    { category: 11, name: "治愈系放空舒缓音乐", cover: "./music/zhiyu.jpg", file: "playlist-category-11.js" },
    { category: 17, name: "印度音乐", cover: "./music/india.jpg", file: "playlist-category-17.js" }
];

window.__categoryDataMap = {};
window.__loadedCategories = {};

window.loadCategoryData = function(categoryId, callback) {
    if (window.__loadedCategories[categoryId]) {
        if (callback) callback(window.__categoryDataMap[categoryId]);
        return;
    }
    var meta = window.__categoryMetaData.find(function(item) { return item.category === categoryId; });
    if (!meta) { if (callback) callback(null); return; }
    if (window.__loadingCategories && window.__loadingCategories[categoryId]) {
        var checkLoaded = function() {
            if (window.__loadedCategories[categoryId]) callback(window.__categoryDataMap[categoryId]);
            else setTimeout(checkLoaded, 100);
        };
        checkLoaded();
        return;
    }
    window.__loadingCategories = window.__loadingCategories || {};
    window.__loadingCategories[categoryId] = true;
    var script = document.createElement('script');
    script.src = meta.file;
    script.onload = function() {
        if (window.__categoryData && window.__categoryData[categoryId]) {
            window.__categoryDataMap[categoryId] = window.__categoryData[categoryId];
            window.__loadedCategories[categoryId] = true;
            if (callback) callback(window.__categoryDataMap[categoryId]);
        } else { if (callback) callback(null); }
        window.__loadingCategories[categoryId] = false;
    };
    script.onerror = function() {
        window.__loadingCategories[categoryId] = false;
        if (callback) callback(null);
    };
    document.head.appendChild(script);
};

window.getCategoryList = function() {
    return window.__categoryMetaData.map(function(item) {
        return { category: item.category, name: item.name, cover: item.cover };
    });
};

window.getCategoryMusics = function(categoryId, callback) {
    if (window.__loadedCategories[categoryId]) {
        var data = window.__categoryDataMap[categoryId];
        if (callback) callback(data ? data.musics : []);
        return;
    }
    window.loadCategoryData(categoryId, function(data) {
        if (callback) callback(data ? data.musics : []);
    });
};
</script>

<!-- ===== 主逻辑 ===== -->
<script>
(function() {
    'use strict';

    var categoryContainer = document.getElementById('categoryContainer');
    var songList = document.getElementById('songList');
    var categoryTitle = document.getElementById('categoryTitle');
    var songCount = document.getElementById('songCount');
    var backBtn = document.getElementById('backBtn');
    var currentSongName = document.getElementById('currentSongName');
    var coverImg = document.getElementById('coverImg');
    var progressFill = document.getElementById('progressFill');
    var progressDot = document.getElementById('progressDot');
    var progressBar = document.getElementById('progressBar');
    var volumeFill = document.getElementById('volumeFill');
    var volumeBar = document.getElementById('volumeBar');
    var currentTimeEl = document.getElementById('currentTime');
    var durationEl = document.getElementById('duration');
    var playBtn = document.getElementById('playBtn');
    var prevBtn = document.getElementById('prevBtn');
    var nextBtn = document.getElementById('nextBtn');
    var shuffleBtn = document.getElementById('shuffleBtn');
    var repeatBtn = document.getElementById('repeatBtn');
    var volumeBtn = document.getElementById('volumeBtn');
    var audio = document.getElementById('audioPlayer');

    var PlayMode = { SEQUENTIAL: 0, SHUFFLE: 1, REPEAT_ONE: 2 };

    var state = {
        currentCategory: null,
        currentSong: null,
        currentSongIndex: -1,
        isPlaying: false,
        songList: [],
        categoryList: window.getCategoryList(),
        playMode: PlayMode.SEQUENTIAL,
        shuffleList: [],
        shuffleIndex: -1,
        isMuted: false,
        previousVolume: 1
    };

    function formatTime(seconds) {
        if (!seconds || isNaN(seconds)) return '00:00';
        var mins = Math.floor(seconds / 60);
        var secs = Math.floor(seconds % 60);
        return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
    }

    function shuffleArray(arr) {
        var shuffled = arr.slice();
        for (var i = shuffled.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var temp = shuffled[i];
            shuffled[i] = shuffled[j];
            shuffled[j] = temp;
        }
        return shuffled;
    }

    function showTip(text) {
        var tip = document.getElementById('playModeTip');
        tip.textContent = text;
        tip.classList.add('show');
        clearTimeout(tip._timer);
        tip._timer = setTimeout(function() { tip.classList.remove('show'); }, 1500);
    }

    function updatePlayModeButton() {
        var icon = repeatBtn.querySelector('i');
        switch (state.playMode) {
            case PlayMode.SEQUENTIAL: icon.className = 'fas fa-redo'; repeatBtn.classList.remove('active'); shuffleBtn.classList.remove('active'); break;
            case PlayMode.SHUFFLE: icon.className = 'fas fa-random'; repeatBtn.classList.remove('active'); shuffleBtn.classList.add('active'); break;
            case PlayMode.REPEAT_ONE: icon.className = 'fas fa-repeat'; repeatBtn.classList.add('active'); shuffleBtn.classList.remove('active'); break;
        }
    }

    function renderCategories() {
        var html = '';
        state.categoryList.forEach(function(cat) {
            html += '<div class="category-item" data-category="' + cat.category + '">';
            html += '  <img src="' + cat.cover + '" alt="' + cat.name + '" loading="lazy">';
            html += '  <span class="cat-name">' + cat.name + '</span>';
            html += '</div>';
        });
        categoryContainer.innerHTML = html;
        categoryContainer.querySelectorAll('.category-item').forEach(function(el) {
            el.addEventListener('click', function() {
                var categoryId = parseInt(this.dataset.category);
                handleCategoryClick(categoryId);
            });
        });
    }

    function handleCategoryClick(categoryId) {
        categoryContainer.querySelectorAll('.category-item').forEach(function(el) {
            el.classList.toggle('active', parseInt(el.dataset.category) === categoryId);
        });
        state.currentCategory = categoryId;
        state.currentSongIndex = -1;
        state.currentSong = null;
        state.shuffleList = [];
        songList.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>加载中...</p></div>';
        categoryTitle.textContent = '加载中...';
        backBtn.style.display = 'none';
        songCount.textContent = '';
        window.getCategoryMusics(categoryId, function(musics) {
            if (musics && musics.length > 0) {
                state.songList = musics;
                renderSongList(musics);
                var cat = state.categoryList.find(function(c) { return c.category === categoryId; });
                categoryTitle.textContent = cat ? cat.name : '歌曲列表';
                songCount.textContent = musics.length + ' 首';
                backBtn.style.display = 'none';
            } else {
                songList.innerHTML = '<div class="empty-state"><i class="fas fa-music"></i><p>该分类暂无歌曲</p></div>';
                categoryTitle.textContent = '暂无歌曲';
                songCount.textContent = '';
            }
        });
    }

    function renderSongList(musics) {
        if (!musics || musics.length === 0) {
            songList.innerHTML = '<div class="empty-state"><i class="fas fa-music"></i><p>该分类暂无歌曲</p></div>';
            return;
        }
        var html = '';
        musics.forEach(function(song, index) {
            var isActive = state.currentSong && state.currentSong.id[1] === song.id[1];
            html += '<div class="song-item' + (isActive ? ' active' : '') + '" data-index="' + index + '">';
            html += '  <span class="index">' + (index + 1) + '</span>';
            html += '  <span class="song-name">' + song.name + '</span>';
            if (isActive && state.isPlaying) {
                html += '  <span class="playing-icon"><i class="fas fa-volume-up"></i></span>';
            }
            html += '</div>';
        });
        songList.innerHTML = html;
        songList.querySelectorAll('.song-item').forEach(function(el) {
            el.addEventListener('click', function() {
                var index = parseInt(this.dataset.index);
                playSong(index);
            });
        });
    }

    function updateSongListHighlight() {
        var items = songList.querySelectorAll('.song-item');
        items.forEach(function(el, i) {
            var song = state.songList[i];
            if (!song) return;
            var isActive = state.currentSong && state.currentSong.id[1] === song.id[1];
            el.classList.toggle('active', isActive);
            var icon = el.querySelector('.playing-icon');
            if (isActive && state.isPlaying) {
                if (!icon) {
                    icon = document.createElement('span');
                    icon.className = 'playing-icon';
                    icon.innerHTML = '<i class="fas fa-volume-up"></i>';
                    el.appendChild(icon);
                }
                icon.style.display = 'flex';
            } else if (icon) {
                icon.style.display = 'none';
            }
        });
    }

    function playSong(index) {
        if (index < 0 || index >= state.songList.length) return;
        state.currentSongIndex = index;
        state.currentSong = state.songList[index];
        if (state.playMode === PlayMode.SHUFFLE) {
            state.shuffleIndex = state.shuffleList.indexOf(index);
            if (state.shuffleIndex === -1) {
                state.shuffleList = shuffleArray(state.songList.map(function(_, i) { return i; }));
                state.shuffleIndex = state.shuffleList.indexOf(index);
            }
        }
        renderSongList(state.songList);
        var cat = state.categoryList.find(function(c) { return c.category === state.currentCategory; });
        coverImg.src = cat ? cat.cover : './music/china.jpg';
        currentSongName.textContent = state.currentSong.name;
        audio.src = state.currentSong.src;
        audio.load();
        audio.play().then(function() {
            state.isPlaying = true;
            updatePlayButton();
        }).catch(function() {
            state.isPlaying = false;
            updatePlayButton();
        });
        document.title = state.currentSong.name + ' - 听松阁';
    }

    function updatePlayButton() {
        var icon = state.isPlaying ? 'fa-pause' : 'fa-play';
        playBtn.innerHTML = '<i class="fas ' + icon + '"></i>';
    }

    function togglePlay() {
        if (!state.currentSong) {
            if (state.songList.length > 0) playSong(0);
            return;
        }
        if (state.isPlaying) audio.pause();
        else audio.play().catch(function() {});
        state.isPlaying = !state.isPlaying;
        updatePlayButton();
        updateSongListHighlight();
    }

    function getNextIndex() {
        if (state.playMode === PlayMode.SHUFFLE) {
            if (state.shuffleList.length === 0) {
                state.shuffleList = shuffleArray(state.songList.map(function(_, i) { return i; }));
                state.shuffleIndex = -1;
            }
            state.shuffleIndex = (state.shuffleIndex + 1) % state.shuffleList.length;
            return state.shuffleList[state.shuffleIndex];
        }
        return (state.currentSongIndex + 1) % state.songList.length;
    }

    function getPrevIndex() {
        if (state.playMode === PlayMode.SHUFFLE) {
            if (state.shuffleList.length === 0) {
                state.shuffleList = shuffleArray(state.songList.map(function(_, i) { return i; }));
                state.shuffleIndex = 0;
            }
            state.shuffleIndex = (state.shuffleIndex - 1 + state.shuffleList.length) % state.shuffleList.length;
            return state.shuffleList[state.shuffleIndex];
        }
        return (state.currentSongIndex - 1 + state.songList.length) % state.songList.length;
    }

    function prevSong() {
        if (state.songList.length === 0) return;
        playSong(getPrevIndex());
    }

    function nextSong() {
        if (state.songList.length === 0) return;
        if (state.playMode === PlayMode.REPEAT_ONE) {
            if (state.currentSong) {
                audio.currentTime = 0;
                audio.play().catch(function() {});
                return;
            }
        }
        playSong(getNextIndex());
    }

    function togglePlayMode() {
        state.playMode = (state.playMode + 1) % 3;
        if (state.playMode === PlayMode.SHUFFLE) {
            state.shuffleList = shuffleArray(state.songList.map(function(_, i) { return i; }));
            state.shuffleIndex = -1;
            if (state.currentSongIndex !== -1) {
                state.shuffleIndex = state.shuffleList.indexOf(state.currentSongIndex);
            }
            showTip('🔀 随机播放');
        } else if (state.playMode === PlayMode.REPEAT_ONE) {
            showTip('🔁 单曲循环');
        } else {
            showTip('▶️ 顺序播放');
        }
        updatePlayModeButton();
    }

    function toggleShuffle() {
        if (state.playMode === PlayMode.SHUFFLE) {
            state.playMode = PlayMode.SEQUENTIAL;
            showTip('▶️ 顺序播放');
        } else {
            state.playMode = PlayMode.SHUFFLE;
            state.shuffleList = shuffleArray(state.songList.map(function(_, i) { return i; }));
            state.shuffleIndex = -1;
            if (state.currentSongIndex !== -1) {
                state.shuffleIndex = state.shuffleList.indexOf(state.currentSongIndex);
            }
            showTip('🔀 随机播放');
        }
        updatePlayModeButton();
    }

    function updateProgress() {
        if (!audio.duration) return;
        var percent = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = percent + '%';
        progressDot.style.left = percent + '%';
        currentTimeEl.textContent = formatTime(audio.currentTime);
        durationEl.textContent = formatTime(audio.duration);
    }

    function handleProgressClick(e) {
        var rect = progressBar.getBoundingClientRect();
        var x = (e.clientX - rect.left) / rect.width;
        audio.currentTime = Math.max(0, Math.min(1, x)) * audio.duration;
    }

    function handleVolumeClick(e) {
        var rect = volumeBar.getBoundingClientRect();
        var x = (e.clientX - rect.left) / rect.width;
        var percent = Math.max(0, Math.min(1, x));
        audio.volume = percent;
        volumeFill.style.width = (percent * 100) + '%';
        state.isMuted = percent === 0;
        updateVolumeIcon();
    }

    function toggleMute() {
        if (state.isMuted) {
            audio.volume = state.previousVolume || 1;
            volumeFill.style.width = (audio.volume * 100) + '%';
            state.isMuted = false;
        } else {
            state.previousVolume = audio.volume;
            audio.volume = 0;
            volumeFill.style.width = '0%';
            state.isMuted = true;
        }
        updateVolumeIcon();
    }

    function updateVolumeIcon() {
        var icon = volumeBtn.querySelector('i');
        if (state.isMuted || audio.volume === 0) icon.className = 'fas fa-volume-mute';
        else if (audio.volume < 0.5) icon.className = 'fas fa-volume-down';
        else icon.className = 'fas fa-volume-up';
    }

    function handleKeyboard(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        switch (e.code) {
            case 'Space': e.preventDefault(); togglePlay(); break;
            case 'ArrowRight': e.preventDefault(); audio.currentTime = Math.min(audio.currentTime + 5, audio.duration); break;
            case 'ArrowLeft': e.preventDefault(); audio.currentTime = Math.max(audio.currentTime - 5, 0); break;
            case 'ArrowUp': e.preventDefault(); audio.volume = Math.min(1, audio.volume + 0.1); volumeFill.style.width = (audio.volume * 100) + '%'; updateVolumeIcon(); break;
            case 'ArrowDown': e.preventDefault(); audio.volume = Math.max(0, audio.volume - 0.1); volumeFill.style.width = (audio.volume * 100) + '%'; updateVolumeIcon(); break;
        }
    }

    function init() {
        renderCategories();
        if (state.categoryList.length > 0) {
            var firstEl = categoryContainer.querySelector('.category-item');
            if (firstEl) firstEl.click();
        }
        updatePlayModeButton();

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        shuffleBtn.addEventListener('click', toggleShuffle);
        repeatBtn.addEventListener('click', togglePlayMode);
        volumeBtn.addEventListener('click', toggleMute);
        progressBar.addEventListener('click', handleProgressClick);
        volumeBar.addEventListener('click', handleVolumeClick);

        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', updateProgress);
        audio.addEventListener('ended', nextSong);
        audio.addEventListener('play', function() { state.isPlaying = true; updatePlayButton(); updateSongListHighlight(); });
        audio.addEventListener('pause', function() { state.isPlaying = false; updatePlayButton(); });
        audio.addEventListener('volumechange', updateVolumeIcon);
        audio.addEventListener('error', function() {
            if (state.songList.length > 1) setTimeout(nextSong, 1000);
        });
        document.addEventListener('keydown', handleKeyboard);
        console.log('🎵 听松阁 · 移动优化版 (列表突出，分类紧凑)');
    }

    if (document.readyState === 'complete') init();
    else window.addEventListener('load', init);
})();
</script>
