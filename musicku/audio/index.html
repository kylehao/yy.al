<title>jQuery流媒体音乐播放器特效 - 站长素材</title>
<link rel="stylesheet" type="text/css" href="css/main.css">
<style>
  /* 保持样式不变，仅限制播放列表高度与滚动 */
  .jAudio--playlist {
    max-height: 250px;
    overflow-y: auto;
  }
  .jAudio--playlist::-webkit-scrollbar {
    width: 6px;
  }
  .jAudio--playlist::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.05);
    border-radius: 3px;
  }
  .jAudio--playlist::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.2);
    border-radius: 3px;
  }

  /* 控制按钮横向一排显示 */
  .jAudio--controls ul {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    list-style: none;
    padding: 0;
    margin: 10px 0 0;
    flex-wrap: nowrap;
  }
  .jAudio--controls ul li {
    display: inline-block;
    flex-shrink: 0;
  }

  /* 模式切换按钮样式 */
  .jAudio--controls ul li .btn-mode {
    background: none;
    border: none;
    color: #999;
    font-size: 14px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: inherit;
    outline: none;
    white-space: nowrap;
  }
  .jAudio--controls ul li .btn-mode:hover {
    color: #333;
    background: rgba(0,0,0,0.05);
  }
  .jAudio--controls ul li .btn-mode.active {
    color: #e74c3c;
    background: rgba(231, 76, 60, 0.1);
  }
  .jAudio--controls ul li .btn-mode .icon {
    display: inline-block;
    margin-right: 4px;
  }
</style>

<script>
// ===== 音量修复 =====
// 插件默认 volume = 0.05，强制设为最大
$(document).on('loadedmetadata', '.jAudio--player audio', function() {
  this.volume = 1.0;
});
$(document).on('play', '.jAudio--player audio', function() {
  this.volume = 1.0;
});

// ===== 模式管理 =====
var playMode = 'sequential';

$('#btn-mode').on('click', function() {
  if (playMode === 'sequential') {
    playMode = 'random';
    $('#mode-label').text('随机');
    $(this).addClass('active');
  } else {
    playMode = 'sequential';
    $('#mode-label').text('顺序');
    $(this).removeClass('active');
  }
  console.log('播放模式切换为:', playMode);
});

// ===== 保存插件原始方法 =====
var originalJAudio = $.fn.jAudio;

// ===== 重写 jAudio 插件 =====
$.fn.jAudio = function(options) {
  // 调用原始插件
  var result = originalJAudio.call(this, options);
  var $player = this;
  var audio = $player.find('audio')[0];
  var playlist = options.playlist || [];

  // 修复音量
  audio.volume = 1.0;

  // 获取当前播放索引
  function getCurrentIndex() {
    var src = audio ? audio.src : '';
    if (!src) return 0;
    for (var i = 0; i < playlist.length; i++) {
      var file = playlist[i].file;
      if (src.indexOf(file) !== -1 || file.indexOf(src) !== -1) {
        return i;
      }
    }
    return 0;
  }

  // 切换到指定索引（使用插件内部方式）
  function changeTrack(index) {
    if (index < 0 || index >= playlist.length) return;
    var item = playlist[index];
    if (!item) return;

    // 直接修改 audio.src 并播放
    audio.src = item.file;
    audio.load();
    audio.play().catch(function(e) {
      if (e.name !== 'AbortError') {
        console.warn('播放出错:', e);
      }
    });

    // 更新缩略图
    if (item.thumb) {
      $player.find('.jAudio--thumb').css('background-image', 'url(' + item.thumb + ')');
    }

    // 更新详情
    var trackName = item.trackName || '';
    var trackArtist = item.trackArtist || '';
    $player.find('.jAudio--details').html('<p><span>' + trackName + '</span><span>' + trackArtist + '</span></p>');

    // 高亮播放列表
    $player.find('.jAudio--playlist-item').removeClass('active');
    $player.find('.jAudio--playlist-item').eq(index).addClass('active');

    // 更新当前索引
    $player.data('currentIndex', index);
  }

  // 存储当前索引
  $player.data('currentIndex', 0);

  // ===== 监听播放结束 =====
  $(audio).off('ended.random').on('ended.random', function() {
    var total = playlist.length;
    if (total <= 1) return;

    var current = getCurrentIndex();
    var nextIndex;

    if (playMode === 'random') {
      do {
        nextIndex = Math.floor(Math.random() * total);
      } while (nextIndex === current && total > 1);
    } else {
      nextIndex = (current + 1) % total;
    }

    changeTrack(nextIndex);
  });

  // ===== 重写 next 按钮 =====
  var $nextBtn = $player.find('[data-action="next"]');
  $nextBtn.off('click').on('click', function(e) {
    e.stopPropagation();
    var total = playlist.length;
    if (total <= 1) return;

    var current = getCurrentIndex();
    var nextIndex;

    if (playMode === 'random') {
      do {
        nextIndex = Math.floor(Math.random() * total);
      } while (nextIndex === current && total > 1);
    } else {
      nextIndex = (current + 1) % total;
    }

    changeTrack(nextIndex);
  });

  // ===== 重写 prev 按钮 =====
  var $prevBtn = $player.find('[data-action="prev"]');
  $prevBtn.off('click').on('click', function(e) {
    e.stopPropagation();
    var total = playlist.length;
    if (total <= 1) return;

    var current = getCurrentIndex();
    var prevIndex;

    if (playMode === 'random') {
      do {
        prevIndex = Math.floor(Math.random() * total);
      } while (prevIndex === current && total > 1);
    } else {
      prevIndex = (current - 1 + total) % total;
    }

    changeTrack(prevIndex);
  });

  // ===== 重写播放列表点击 =====
  $player.find('.jAudio--playlist').off('click', '.jAudio--playlist-item').on('click', '.jAudio--playlist-item', function(e) {
    var index = $(this).index();
    if (index === getCurrentIndex()) return;
    changeTrack(index);
  });

  // ===== 修复播放/暂停状态同步 =====
  // 监听播放事件，更新按钮状态
  $(audio).on('play', function() {
    var $playBtn = $player.find('#btn-pause, #btn-play');
    if ($playBtn.data('action') !== 'pause') {
      $playBtn.data('action', 'pause');
      $playBtn.attr('id', 'btn-pause');
      $playBtn.addClass('active');
    }
  });

  $(audio).on('pause', function() {
    var $playBtn = $player.find('#btn-pause, #btn-play');
    if ($playBtn.data('action') !== 'play') {
      $playBtn.data('action', 'play');
      $playBtn.attr('id', 'btn-play');
      $playBtn.removeClass('active');
    }
  });

  return result;
};
