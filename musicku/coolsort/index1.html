<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音乐播放器 · 视频毛玻璃</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0b0e;
            overflow: hidden;
            height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* ===== 视频背景 — 完全自适应 ===== */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.40) saturate(1.1) contrast(1.05);
            transition: filter 0.3s ease;
        }

        /* ===== 蒙太奇光效层 ===== */
        .montage-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(108, 92, 231, 0.20) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(255, 80, 120, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 200, 255, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse at 10% 80%, rgba(255, 200, 50, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 90% 20%, rgba(50, 200, 150, 0.06) 0%, transparent 45%);
            animation: montagePulse 12s ease-in-out infinite alternate;
        }

        @keyframes montagePulse {
            0% { opacity: 0.6; transform: scale(1) rotate(0deg); }
            33% { opacity: 1; transform: scale(1.02) rotate(0.5deg); }
            66% { opacity: 0.8; transform: scale(0.98) rotate(-0.3deg); }
            100% { opacity: 0.9; transform: scale(1.01) rotate(0.2deg); }
        }

        .montage-overlay::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 140%;
            height: 160%;
            background: radial-gradient(ellipse at 30% 40%, rgba(120, 100, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 60%, rgba(255, 100, 150, 0.06) 0%, transparent 45%);
            pointer-events: none;
            animation: sweepLight 18s ease-in-out infinite alternate;
        }

        @keyframes sweepLight {
            0% { transform: translate(-5%, -5%) scale(1); opacity: 0.4; }
            50% { transform: translate(5%, 3%) scale(1.03); opacity: 0.8; }
            100% { transform: translate(-3%, 8%) scale(0.97); opacity: 0.5; }
        }

        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.10;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 180px 180px;
            animation: grainShift 0.5s steps(3) infinite;
        }

        @keyframes grainShift {
            0% { transform: translate(0, 0); }
            33% { transform: translate(-4px, 3px); }
            66% { transform: translate(5px, -3px); }
            100% { transform: translate(-2px, 2px); }
        }

        /* ===== 播放器容器 ===== */
        .player-wrapper {
            position: relative;
            z-index: 10;
            width: 60%;
            max-width: 960px;
            min-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ===== 卡片公用毛玻璃 ===== */
        .glass-card {
            background: rgba(20, 18, 30, 0.45);
            backdrop-filter: blur(48px) saturate(220%);
            -webkit-backdrop-filter: blur(48px) saturate(220%);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.06) inset, 0 0 60px rgba(108, 92, 231, 0.04);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 40%, transparent 60%, rgba(255, 255, 255, 0.04));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.22);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.10) inset;
        }

        /* ===== 上部卡片 ===== */
        .player-card-top {
            padding: 32px 40px 28px;
        }

        .player-card-top::after {
            content: '';
            position: absolute;
            left: 20px;
            right: 20px;
            bottom: 12px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            border-radius: 100%;
            filter: blur(0.5px);
            pointer-events: none;
        }

        /* ===== 下部卡片 ===== */
        .player-card-bottom {
            padding: 20px 28px 22px;
        }

        .player-card-bottom::after {
            content: '';
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 10px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            border-radius: 100%;
            filter: blur(0.5px);
            pointer-events: none;
        }

        /* ===== 内部布局 ===== */
        .top-section {
            display: flex;
            align-items: stretch;
            gap: 32px;
            position: relative;
        }

        .top-section::after {
            content: '';
            position: absolute;
            bottom: -14px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.02));
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            padding-right: 32px;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }

        .logo-area::after {
            content: '';
            position: absolute;
            right: -2px;
            top: 10%;
            height: 80%;
            width: 2px;
            background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            border-radius: 4px;
        }

        .logo-icon {
            width: 146px;
            height: 146px;
            border-radius: 18px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 8px 32px rgba(108, 92, 231, 0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            background: rgba(0,0,0,0.3);
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .right-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            min-width: 0;
        }

        .track-info-row {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .track-name-display {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.30);
        }
        .track-artist-display {
            font-size: 15px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.60);
            white-space: nowrap;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        .progress-row {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 2px 0;
        }
        .progress-row .time {
            font-size: 13px;
            font-weight: 450;
            color: rgba(255, 255, 255, 0.50);
            min-width: 38px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }
        .progress-row .progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            transition: height 0.15s;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.03);
        }
        .progress-row .progress-bar:hover { height: 7px; }
        .progress-row .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.70), rgba(255, 255, 255, 0.90));
            border-radius: 20px;
            transition: width 0.05s linear;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.10);
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            width: 6px;
            height: 9px;
            background: rgba(255, 255, 255, 0.20);
            border-radius: 20px;
            filter: blur(2px);
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-top: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }
        .ctrl-btn {
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.50);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            padding: 4px;
            border-radius: 40px;
            position: relative;
        }
        .ctrl-btn:hover { color: #ffffff; transform: scale(1.06); }
        .ctrl-btn:active { transform: scale(0.92); }
        .ctrl-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.20));
        }
        .ctrl-btn.play-btn svg { width: 36px; height: 36px; }
        .ctrl-btn.play-btn {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 4px 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25), 0 0 30px rgba(108, 92, 231, 0.04);
        }
        .ctrl-btn.play-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.30), 0 0 40px rgba(108, 92, 231, 0.10);
        }
        .ctrl-btn.shuffle-btn { color: rgba(255, 255, 255, 0.35); }
        .ctrl-btn.shuffle-btn.active { color: #ffffff; filter: drop-shadow(0 0 16px rgba(255, 255, 255, 0.20)); }
        .ctrl-btn.shuffle-btn svg { width: 22px; height: 22px; }

        .category-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .category-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.50);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }
        .category-btn:hover {
            background: rgba(255, 255, 255, 0.10);
            color: #fff;
        }
        .category-btn.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.20);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.04);
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .playlist-header span {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.4px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
        .playlist-header .count {
            font-size: 12px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.25);
        }

        .playlist {
            list-style: none;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.06) transparent;
        }
        .playlist::-webkit-scrollbar { width: 4px; }
        .playlist::-webkit-scrollbar-track { background: transparent; }
        .playlist::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 20px; }

        .playlist li {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            margin-bottom: 2px;
            border-radius: 16px;
            background: transparent;
            transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.65);
            border: 1px solid transparent;
            position: relative;
        }
        .playlist li:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }
        .playlist li.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.10);
            color: #ffffff;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        .playlist li.active::before {
            content: '';
            position: absolute;
            left: 4px;
            top: 20%;
            height: 60%;
            width: 2px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.40), rgba(255, 255, 255, 0.08));
            border-radius: 4px;
        }

        .playlist li .index {
            font-size: 12px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.20);
            margin-right: 14px;
            min-width: 22px;
            text-align: right;
        }
        .playlist li .meta {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .playlist li .meta .title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.1px;
        }
        .playlist li .meta .artist {
            font-size: 11px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 1px;
        }
        .playlist li .duration {
            font-size: 11px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.20);
            margin-left: 8px;
            font-variant-numeric: tabular-nums;
        }
        .playlist li .play-icon {
            opacity: 0;
            margin-left: 6px;
            transition: opacity 0.15s;
            color: rgba(255, 255, 255, 0.50);
        }
        .playlist li.active .play-icon { opacity: 1; }
        .playlist li .play-icon svg { width: 14px; height: 14px; fill: currentColor; }

        .credit {
            margin-top: 12px;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.3px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 12px;
        }
        .credit a {
            color: rgba(255, 255, 255, 0.20);
            text-decoration: none;
            transition: color 0.2s;
        }
        .credit a:hover { color: rgba(255, 255, 255, 0.40); }

        .loading-tip {
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .player-wrapper { width: 80%; min-width: unset; }
            .top-section { flex-direction: column; gap: 16px; }
            .top-section::after { bottom: -8px; }
            .logo-area { border-right: none; padding-right: 0; padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
            .logo-area::after { display: none; }
        }

        @media (max-width: 640px) {
            .player-wrapper { width: 95%; min-width: unset; }
            .player-card-top { padding: 20px 16px 24px; border-radius: 24px; }
            .player-card-bottom { padding: 16px 14px 18px; border-radius: 24px; }
            .track-name-display { font-size: 16px; }
            .track-artist-display { font-size: 13px; }
            .ctrl-btn svg { width: 20px; height: 20px; }
            .ctrl-btn.play-btn svg { width: 30px; height: 30px; }
            .logo-icon { width: 60px; height: 60px; border-radius: 14px; }
            .glass-card { border-radius: 24px; }
            .glass-card::before { border-radius: 24px; }
        }
    </style>
</head>
<body>

    <!-- ===== 视频背景 (自适应) ===== -->
    <video id="bgVideo" autoplay muted loop playsinline>
        <source src="blog-header-bg.mp4" type="video/mp4">
        <source src="23881-337972830_medium.mp4" type="video/mp4">
    </video>

    <!-- ===== 蒙太奇光效 ===== -->
    <div class="montage-overlay"></div>
    <div class="grain-overlay"></div>

    <!-- ===== 播放器 ===== -->
    <div class="player-wrapper">

        <!-- ===== 上部卡片 ===== -->
        <div class="player-card-top glass-card" role="application" aria-label="音乐播放控制">
            <div class="top-section">
                <div class="logo-area">
                    <div class="logo-icon">
                        <img src="https://img12.360buyimg.com/ddimg/jfs/t1/463758/11/18904/23837/6a474a5bF2581a1f1/00151901907a00b7.jpg" alt="Logo">
                    </div>
                </div>
                <div class="right-info">
                    <div class="track-info-row">
                        <span class="track-name-display" id="trackNameDisplay">夜航星</span>
                        <span class="track-artist-display" id="trackArtistDisplay">不才</span>
                    </div>

                    <div class="progress-row">
                        <span class="time" id="currentTime">0:00</span>
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <span class="time" id="totalTime">0:00</span>
                    </div>

                    <div class="controls-row">
                        <button class="ctrl-btn" id="prevBtn" aria-label="上一首">
                            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button class="ctrl-btn play-btn" id="playBtn" aria-label="播放/暂停">
                            <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <button class="ctrl-btn" id="nextBtn" aria-label="下一首">
                            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                        </button>
                        <button class="ctrl-btn shuffle-btn" id="shuffleBtn" aria-label="随机播放切换">
                            <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm0.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 下部卡片 ===== -->
        <div class="player-card-bottom glass-card">
            <div class="category-row" id="categoryRow">
                <button class="category-btn active" data-category="chinese">国语</button>
                <button class="category-btn" data-category="usa">欧美</button>
                <button class="category-btn" data-category="korea">韩国</button>
                <button class="category-btn" data-category="japan">日本</button>
                <button class="category-btn" data-category="pure">纯音乐</button>
                <button class="category-btn" data-category="thai">泰国</button>
                <button class="category-btn" data-category="india">印度</button>
                <button class="category-btn" data-category="yanglanyi">洋澜一</button>
                <button class="category-btn" data-category="zhoushen">周深</button>
            </div>

            <div class="playlist-header">
                <span>📋 播放列表</span>
                <span class="count" id="listCount">0 首</span>
            </div>
            <ul class="playlist" id="playlistContainer">
                <li class="loading-tip">加载中...</li>
            </ul>
            <div class="credit">
                <a href="#" target="_blank">🎵 分类音乐 · 视频毛玻璃</a>  · 蒙太奇光效
            </div>
        </div>

    </div>

    <script>
        (function() {
            // ---------- 核心状态 ----------
            const state = {
                currentCategory: 'chinese',
                playlist: [],
                currentIndex: 0,
                isPlaying: false,
                isShuffle: false,
                shuffleHistory: [],
                remainingShuffle: [],
                isLoading: false,
                loadedCategories: {}
            };

            // DOM 引用
            const audio = new Audio();
            const playBtn = document.getElementById('playBtn');
            const playIcon = document.getElementById('playIcon');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const currentTimeEl = document.getElementById('currentTime');
            const totalTimeEl = document.getElementById('totalTime');
            const trackNameDisplay = document.getElementById('trackNameDisplay');
            const trackArtistDisplay = document.getElementById('trackArtistDisplay');
            const playlistContainer = document.getElementById('playlistContainer');
            const listCount = document.getElementById('listCount');
            const categoryBtns = document.querySelectorAll('.category-btn');

            // ---------- 工具函数 ----------
            function formatTime(seconds) {
                if (isNaN(seconds) || seconds < 0) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            // ---------- 播放器核心 ----------
            function loadTrack(index) {
                const track = state.playlist[index];
                if (!track) return;
                audio.src = track.src;
                audio.load();
                trackNameDisplay.textContent = track.title || '未知歌曲';
                trackArtistDisplay.textContent = track.artist || '未知歌手';
                if (track.duration) {
                    totalTimeEl.textContent = formatTime(track.duration);
                } else {
                    totalTimeEl.textContent = '0:00';
                }
                progressFill.style.width = '0%';
                currentTimeEl.textContent = '0:00';
                highlightActiveItem(index);
                if (state.isPlaying) {
                    audio.play().catch(() => {});
                }
            }

            function highlightActiveItem(index) {
                const items = playlistContainer.querySelectorAll('li');
                items.forEach((li, i) => {
                    li.classList.toggle('active', i === index);
                });
            }

            function renderPlaylist() {
                playlistContainer.innerHTML = '';
                if (!state.playlist || state.playlist.length === 0) {
                    playlistContainer.innerHTML = `<li style="justify-content:center;color:rgba(255,255,255,0.25);padding:20px;">暂无歌曲</li>`;
                    listCount.textContent = '0 首';
                    return;
                }
                state.playlist.forEach((track, index) => {
                    const li = document.createElement('li');
                    li.dataset.index = index;

                    const indexSpan = document.createElement('span');
                    indexSpan.className = 'index';
                    indexSpan.textContent = (index + 1).toString().padStart(2, '0');
                    li.appendChild(indexSpan);

                    const metaDiv = document.createElement('div');
                    metaDiv.className = 'meta';
                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'title';
                    titleSpan.textContent = track.title || '未命名';
                    const artistSpan = document.createElement('span');
                    artistSpan.className = 'artist';
                    artistSpan.textContent = track.artist || '';
                    metaDiv.appendChild(titleSpan);
                    metaDiv.appendChild(artistSpan);
                    li.appendChild(metaDiv);

                    const durationSpan = document.createElement('span');
                    durationSpan.className = 'duration';
                    durationSpan.textContent = track.duration ? formatTime(track.duration) : '--:--';
                    li.appendChild(durationSpan);

                    const playIconSpan = document.createElement('span');
                    playIconSpan.className = 'play-icon';
                    playIconSpan.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
                    li.appendChild(playIconSpan);

                    li.addEventListener('click', () => {
                        if (state.currentIndex === index && state.isPlaying) return;
                        state.currentIndex = index;
                        if (state.isShuffle) resetShuffleQueue();
                        loadTrack(state.currentIndex);
                        if (!state.isPlaying) {
                            state.isPlaying = true;
                            updatePlayButton();
                            audio.play().catch(() => {});
                        } else {
                            audio.play().catch(() => {});
                        }
                    });

                    playlistContainer.appendChild(li);
                });
                listCount.textContent = `${state.playlist.length} 首`;
                highlightActiveItem(state.currentIndex);
            }

            function updatePlayButton() {
                if (state.isPlaying) {
                    playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
                } else {
                    playIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
                }
            }

            function togglePlay() {
                if (!state.playlist || state.playlist.length === 0) return;
                if (audio.paused) {
                    audio.play().catch(() => {});
                    state.isPlaying = true;
                } else {
                    audio.pause();
                    state.isPlaying = false;
                }
                updatePlayButton();
            }

            function resetShuffleQueue() {
                if (!state.playlist || state.playlist.length === 0) return;
                const indices = Array.from({ length: state.playlist.length }, (_, i) => i);
                const filtered = indices.filter(i => i !== state.currentIndex);
                for (let i = filtered.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
                }
                state.remainingShuffle = filtered;
                state.shuffleHistory = [state.currentIndex];
            }

            function getNextShuffleIndex() {
                if (state.remainingShuffle.length === 0) resetShuffleQueue();
                const next = state.remainingShuffle.shift();
                if (next === state.currentIndex && state.remainingShuffle.length > 0) {
                    const alt = state.remainingShuffle.shift();
                    if (alt !== undefined) {
                        state.remainingShuffle.unshift(next);
                        return alt;
                    }
                    return next;
                }
                return next;
            }

            function playNext() {
                if (!state.playlist || state.playlist.length === 0) return;
                if (state.isShuffle) {
                    const nextIdx = getNextShuffleIndex();
                    if (nextIdx === undefined) return;
                    state.currentIndex = nextIdx;
                    loadTrack(state.currentIndex);
                    if (!state.isPlaying) { state.isPlaying = true; updatePlayButton(); }
                    audio.play().catch(() => {});
                } else {
                    state.currentIndex = (state.currentIndex + 1) % state.playlist.length;
                    loadTrack(state.currentIndex);
                    if (!state.isPlaying) { state.isPlaying = true; updatePlayButton(); }
                    audio.play().catch(() => {});
                }
            }

            function playPrev() {
                if (!state.playlist || state.playlist.length === 0) return;
                if (state.isShuffle) {
                    if (state.shuffleHistory.length > 1) {
                        state.shuffleHistory.pop();
                        const prevIdx = state.shuffleHistory[state.shuffleHistory.length - 1];
                        if (prevIdx !== undefined) {
                            state.currentIndex = prevIdx;
                            loadTrack(state.currentIndex);
                            if (!state.isPlaying) { state.isPlaying = true; updatePlayButton(); }
                            audio.play().catch(() => {});
                            state.shuffleHistory.push(state.currentIndex);
                            return;
                        }
                    }
                    state.currentIndex = (state.currentIndex - 1 + state.playlist.length) % state.playlist.length;
                    loadTrack(state.currentIndex);
                    if (!state.isPlaying) { state.isPlaying = true; updatePlayButton(); }
                    audio.play().catch(() => {});
                    resetShuffleQueue();
                } else {
                    state.currentIndex = (state.currentIndex - 1 + state.playlist.length) % state.playlist.length;
                    loadTrack(state.currentIndex);
                    if (!state.isPlaying) { state.isPlaying = true; updatePlayButton(); }
                    audio.play().catch(() => {});
                }
            }

            function toggleShuffle() {
                state.isShuffle = !state.isShuffle;
                shuffleBtn.classList.toggle('active', state.isShuffle);
                if (state.isShuffle) resetShuffleQueue();
                else { state.remainingShuffle = []; state.shuffleHistory = []; }
            }

            // ---------- 分类加载 ----------
            function loadCategoryData(category) {
                if (state.isLoading) return;
                if (state.loadedCategories[category]) {
                    applyCategoryData(category);
                    return;
                }

                state.isLoading = true;
                playlistContainer.innerHTML = `<li class="loading-tip">⏳ 加载 ${getCategoryLabel(category)} 音乐...</li>`;

                const scriptMap = {
                    chinese: 'music.js',
                    usa: 'usa.js',
                    korea: 'korea.js',
                    japan: 'japan.js',
                    india: 'india.js',
                    pure: 'pure.js',
                    thai: 'thai.js',
                    yanglanyi: 'yanglanyi.js',
                    zhoushen: 'zhoushen.js'
                };

                const fileName = scriptMap[category];
                if (!fileName) {
                    state.isLoading = false;
                    playlistContainer.innerHTML = `<li style="justify-content:center;color:rgba(255,255,255,0.25);padding:20px;">未知分类</li>`;
                    return;
                }

                const script = document.createElement('script');
                script.src = fileName;
                script.onload = () => {
                    state.isLoading = false;
                    let data = [];
                    if (category === 'chinese' && typeof MUSIC_DATA !== 'undefined') data = MUSIC_DATA;
                    else if (category === 'usa' && typeof USA_DATA !== 'undefined') data = USA_DATA;
                    else if (category === 'korea' && typeof KOREA_DATA !== 'undefined') data = KOREA_DATA;
                    else if (category === 'japan' && typeof JAPAN_DATA !== 'undefined') data = JAPAN_DATA;
                    else if (category === 'india' && typeof INDIA_DATA !== 'undefined') data = INDIA_DATA;
                    else if (category === 'pure' && typeof PURE_DATA !== 'undefined') data = PURE_DATA;
                    else if (category === 'thai' && typeof THAI_DATA !== 'undefined') data = THAI_DATA;
                    else if (category === 'yanglanyi' && typeof YANGLANYI_DATA !== 'undefined') data = YANGLANYI_DATA;
                    else if (category === 'zhoushen' && typeof ZHOUSHEN_DATA !== 'undefined') data = ZHOUSHEN_DATA;

                    if (!data || !Array.isArray(data) || data.length === 0) {
                        console.warn(`${fileName} 数据为空，使用备用数据`);
                        data = getFallbackData(category);
                    }

                    state.loadedCategories[category] = data;
                    applyCategoryData(category);
                };
                script.onerror = () => {
                    state.isLoading = false;
                    console.error(`加载 ${fileName} 失败，使用备用数据`);
                    const fallback = getFallbackData(category);
                    state.loadedCategories[category] = fallback;
                    applyCategoryData(category);
                };
                document.head.appendChild(script);
            }

            function applyCategoryData(category) {
                const data = state.loadedCategories[category] || [];
                state.currentCategory = category;
                state.playlist = data.slice() || [];
                state.currentIndex = 0;
                state.isShuffle = false;
                shuffleBtn.classList.remove('active');
                state.remainingShuffle = [];
                state.shuffleHistory = [];
                renderPlaylist();
                if (state.playlist.length > 0) {
                    loadTrack(0);
                } else {
                    trackNameDisplay.textContent = '暂无歌曲';
                    trackArtistDisplay.textContent = '';
                    totalTimeEl.textContent = '0:00';
                    currentTimeEl.textContent = '0:00';
                    progressFill.style.width = '0%';
                }
                if (state.isPlaying) {
                    audio.pause();
                    state.isPlaying = false;
                    updatePlayButton();
                }
                categoryBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.category === category);
                });
            }

            function getCategoryLabel(category) {
                const map = { chinese: '国语', usa: '欧美', korea: '韩国', japan: '日本', india: '印度', pure: '纯音乐', thai: '泰国', yanglanyi: '洋澜一', zhoushen: '周深' };
                return map[category] || category;
            }

            function getFallbackData(category) {
                const fallbacks = {
                    chinese: [
                        { id: 1, title: '夜航星', artist: '不才', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', duration: 210 },
                        { id: 2, title: '起风了', artist: '买辣椒也用券', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3', duration: 238 }
                    ],
                    usa: [
                        { id: 101, title: 'Shape of You', artist: 'Ed Sheeran', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', duration: 245 },
                        { id: 102, title: 'See You Again', artist: 'Wiz Khalifa', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3', duration: 220 }
                    ],
                    korea: [
                        { id: 201, title: 'Gee', artist: '少女时代', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', duration: 210 },
                        { id: 202, title: 'I Am The Best', artist: '2NE1', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3', duration: 230 }
                    ],
                    japan: [
                        { id: 301, title: 'Lemon', artist: '米津玄師', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', duration: 245 },
                        { id: 302, title: 'Butter-Fly', artist: '和田光司', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3', duration: 230 }
                    ]
                };
                return fallbacks[category] || fallbacks.chinese;
            }

            // ---------- 事件绑定 ----------
            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', playPrev);
            nextBtn.addEventListener('click', playNext);
            shuffleBtn.addEventListener('click', toggleShuffle);

            audio.addEventListener('loadedmetadata', () => {
                if (audio.duration && isFinite(audio.duration)) {
                    totalTimeEl.textContent = formatTime(audio.duration);
                }
            });

            let isDragging = false;
            audio.addEventListener('timeupdate', () => {
                if (isDragging) return;
                if (audio.duration && isFinite(audio.duration)) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = `${percent}%`;
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                } else {
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                }
            });

            audio.addEventListener('ended', () => { playNext(); });

            function handleProgressClick(e) {
                const rect = progressBar.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const clamped = Math.min(1, Math.max(0, x));
                if (audio.duration && isFinite(audio.duration)) {
                    const newTime = clamped * audio.duration;
                    audio.currentTime = newTime;
                    progressFill.style.width = `${clamped * 100}%`;
                    currentTimeEl.textContent = formatTime(newTime);
                }
            }

            progressBar.addEventListener('mousedown', (e) => { isDragging = true; handleProgressClick(e); });
            window.addEventListener('mousemove', (e) => { if (isDragging) handleProgressClick(e); });
            window.addEventListener('mouseup', () => { isDragging = false; });
            progressBar.addEventListener('touchstart', (e) => {
                isDragging = true;
                const touch = e.touches[0];
                handleProgressClick({ clientX: touch.clientX });
            });
            progressBar.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    const touch = e.touches[0];
                    handleProgressClick({ clientX: touch.clientX });
                }
            });
            progressBar.addEventListener('touchend', () => { isDragging = false; });

            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            });

            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const cat = btn.dataset.category;
                    if (cat === state.currentCategory) return;
                    loadCategoryData(cat);
                });
            });

            // ---------- 初始化 ----------
            const initScript = document.createElement('script');
            initScript.src = 'music.js';
            initScript.onload = () => {
                if (typeof MUSIC_DATA !== 'undefined') {
                    state.loadedCategories.chinese = MUSIC_DATA;
                } else {
                    state.loadedCategories.chinese = getFallbackData('chinese');
                }
                applyCategoryData('chinese');
            };
            initScript.onerror = () => {
                console.warn('music.js 加载失败，使用备用数据');
                state.loadedCategories.chinese = getFallbackData('chinese');
                applyCategoryData('chinese');
            };
            document.head.appendChild(initScript);

            // 视频自动播放
            const bgVideo = document.getElementById('bgVideo');
            bgVideo.play().catch(() => {});
        })();
    </script>

</body>
</html>
