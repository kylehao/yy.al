<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>js悬浮小球音乐播放器代码</title>

<link rel="stylesheet" href="file/music-min.css">

</head>
<body>

<!-- 背景层 -->
<div id="bgLayer"></div>

<audio id="music" preload="metadata">
    <source src="file/whkl.mp3" type="audio/mpeg">
</audio>

<div class="circle">
	<div class="imgs"></div>
	<div class="share">
		<button id="star" onClick="star()"><i class="icon"><i class="icon icon-del icon-star"></i></i></button>
	</div>
	<!-- 模式切换按钮 - 在小球上方 -->
	<div class="mode-switch" id="modeSwitch">
		<button class="mode-btn active" data-mode="0" title="顺序播放">▶</button>
		<button class="mode-btn" data-mode="1" title="单曲循环">🔁</button>
		<button class="mode-btn" data-mode="2" title="随机播放">🔀</button>
	</div>
	<ul>
		<li><div id="yl"><span class="ytext">100</span><div id="yi" onClick="cours()"><div id="yn"></div></div><span class="bol"></span></div>
		<button onClick="song()"><i class="icon"><i class="icon icon-del icon-yin"></i></i></button></li>
		<li><button id="listToggleBtn" onclick="toggleMusicList()"><i class="icon"><div id="musicLists"><ul id="ls"></ul></div><i class="icon icon-del icon-lis"></i></i></button></li>
		<li><button onClick="upMusic()"><i class="icon"><i class="icon icon-del icon-lef"></i></i></button></li>
		<li><button onClick="dowMusic()"><i class="icon"><i class="icon icon-del icon-rig"></i></i></button></li>
	</ul>
</div>

<script src="file/music-min.js" type="text/javascript"></script>

</body>
</html>
