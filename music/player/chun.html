            { path: 'https://cloud.hhhnn.com/d/189Family133/音乐视听/纯音乐/马友友-天鹅 大提琴演奏.mp3', name: '马友友-天鹅 大提琴演奏', artist: '马友友' },
            { path: 'https://cloud.hhhnn.com/d/189Family133/音乐视听/纯音乐/齐普利安·波隆贝斯库-永恒的记忆.mp3', name: '齐普利安·波隆贝斯库-永恒的记忆', artist: '齐普利安·波隆贝斯库' }
        ];

        // ========== 获取 DOM 元素 ==========
        const playlistContainer = document.getElementById('playlistContainer');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const progressSlider = document.getElementById('progressSlider');
        const currentTimeDisplay = document.getElementById('currentTimeDisplay');
        const durationDisplay = document.getElementById('durationDisplay');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const loopBtn = document.getElementById('loopBtn');

        // ========== 创建 Audio 元素 ==========
        const audio = new Audio();
        audio.preload = 'metadata';

        let currentTrack = 0;
        let isShuffle = false;
        let loopMode = 0; // 0:列表循环 1:单曲循环 2:顺序播放
        let isDragging = false;

        // ========== 工具函数 ==========
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // ========== 渲染播放列表 ==========
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((song, index) => {
                const div = document.createElement('div');
                div.className = 'playlist-item' + (index === currentTrack ? ' active' : '');
                const orderSpan = document.createElement('span');
                orderSpan.className = 'order';
                orderSpan.textContent = index + 1;
                const icon = document.createElement('i');
                icon.className = 'fas fa-music';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'song-name';
                nameSpan.textContent = song.name;
                div.appendChild(orderSpan);
                div.appendChild(icon);
                div.appendChild(nameSpan);
                div.dataset.index = index;
                div.addEventListener('click', () => playTrack(index, true));
                playlistContainer.appendChild(div);
            });
        }

        // ========== 核心播放函数 ==========
        function playTrack(index, userInitiated = false) {
            if (index < 0 || index >= playlist.length) return;
            currentTrack = index;
            const song = playlist[index];
            audio.src = song.path;
            audio.load();
            audio.play().catch(err => {
                console.log('自动播放被拦截，等待用户交互');
            });
            updateUI(index);
        }

        function updateUI(index) {
            const items = playlistContainer.querySelectorAll('.playlist-item');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            const song = playlist[index];
            if (song) {
                songTitle.textContent = song.name;
                songArtist.textContent = song.artist || '未知艺术家';
            }
            const activeItem = playlistContainer.querySelector('.playlist-item.active');
            if (activeItem) {
                activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
            updatePlayButton();
        }

        function updatePlayButton() {
            const icon = playBtn.querySelector('i');
            if (audio.paused) {
                icon.className = 'fas fa-play';
            } else {
                icon.className = 'fas fa-pause';
            }
        }

        // ========== 进度更新 ==========
        function updateProgress() {
            if (isDragging) return;
            if (!audio.duration || isNaN(audio.duration) || audio.duration === Infinity) {
                progressSlider.value = 0;
                currentTimeDisplay.textContent = '0:00';
                durationDisplay.textContent = '0:00';
                return;
            }
            const percent = (audio.currentTime / audio.duration) * 1000;
            progressSlider.value = Math.min(1000, Math.max(0, percent));
            currentTimeDisplay.textContent = formatTime(audio.currentTime);
            durationDisplay.textContent = formatTime(audio.duration);
        }

        function seekTo(value) {
            if (!audio.duration || isNaN(audio.duration) || audio.duration === Infinity) return;
            const time = (value / 1000) * audio.duration;
            audio.currentTime = Math.min(audio.duration, Math.max(0, time));
            updateProgress();
        }

        // ========== 播放控制 ==========
        function togglePlay() {
            if (audio.paused) {
                audio.play().catch(err => {
                    console.log('播放失败:', err);
                });
            } else {
                audio.pause();
            }
            updatePlayButton();
        }

        function playPrev() {
            if (isShuffle) {
                let idx = Math.floor(Math.random() * playlist.length);
                while (idx === currentTrack && playlist.length > 1) {
                    idx = Math.floor(Math.random() * playlist.length);
                }
                playTrack(idx, true);
            } else {
                const prev = (currentTrack - 1 + playlist.length) % playlist.length;
                playTrack(prev, true);
            }
        }

        function playNext() {
            if (isShuffle) {
                let idx = Math.floor(Math.random() * playlist.length);
                while (idx === currentTrack && playlist.length > 1) {
                    idx = Math.floor(Math.random() * playlist.length);
                }
                playTrack(idx, true);
            } else {
                const next = (currentTrack + 1) % playlist.length;
                playTrack(next, true);
            }
        }

        // ========== 播放结束处理 ==========
        function handleEnded() {
            if (loopMode === 1) { // 单曲循环
                audio.currentTime = 0;
                audio.play().catch(() => {});
                return;
            }
            if (loopMode === 2) { // 顺序播放
                if (currentTrack < playlist.length - 1) {
                    playTrack(currentTrack + 1, false);
                } else {
                    audio.pause();
                    audio.currentTime = 0;
                    updatePlayButton();
                }
                return;
            }
            // 列表循环
            if (isShuffle) {
                let idx = Math.floor(Math.random() * playlist.length);
                while (idx === currentTrack && playlist.length > 1) {
                    idx = Math.floor(Math.random() * playlist.length);
                }
                playTrack(idx, false);
            } else {
                const next = (currentTrack + 1) % playlist.length;
                playTrack(next, false);
            }
        }

        // ========== 模式切换 ==========
        function toggleLoop() {
            loopMode = (loopMode + 1) % 3;
            const icons = ['fa-redo-alt', 'fa-repeat-1', 'fa-arrow-right'];
            const titles = ['列表循环', '单曲循环', '顺序播放'];
            loopBtn.querySelector('i').className = `fas ${icons[loopMode]}`;
            loopBtn.title = titles[loopMode];
            loopBtn.classList.toggle('mode-active', loopMode !== 0);
            if (loopMode === 1) {
                loopBtn.style.color = '#f6c27e';
            } else {
                loopBtn.style.color = '';
            }
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('mode-active', isShuffle);
            shuffleBtn.title = isShuffle ? '随机播放 (开)' : '随机播放 (关)';
        }

        // ========== 绑定事件 ==========
        // 进度条
        progressSlider.addEventListener('input', function(e) {
            isDragging = true;
            const val = parseFloat(e.target.value);
            if (audio.duration && !isNaN(audio.duration) && audio.duration !== Infinity) {
                const time = (val / 1000) * audio.duration;
                currentTimeDisplay.textContent = formatTime(time);
            }
        });

        progressSlider.addEventListener('change', function(e) {
            isDragging = false;
            seekTo(parseFloat(e.target.value));
        });

        // 音频事件
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', function() {
            durationDisplay.textContent = formatTime(audio.duration);
            updateProgress();
        });
        audio.addEventListener('play', updatePlayButton);
        audio.addEventListener('pause', updatePlayButton);
        audio.addEventListener('ended', handleEnded);

        // 按钮事件
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', playPrev);
        nextBtn.addEventListener('click', playNext);
        shuffleBtn.addEventListener('click', toggleShuffle);
        loopBtn.addEventListener('click', toggleLoop);

        // ========== 键盘快捷键 ==========
        document.addEventListener('keydown', function(e) {
            const tag = document.activeElement?.tagName?.toLowerCase() || '';
            if (tag === 'input' || tag === 'textarea') return;
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                audio.currentTime = Math.max(0, audio.currentTime - 5);
                updateProgress();
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5);
                updateProgress();
            }
            if (e.code === 'ArrowUp') {
                e.preventDefault();
                audio.volume = Math.min(1, audio.volume + 0.1);
            }
            if (e.code === 'ArrowDown') {
                e.preventDefault();
                audio.volume = Math.max(0, audio.volume - 0.1);
            }
            if (e.key === 'n' || e.key === 'N') {
                e.preventDefault();
                playNext();
            }
            if (e.key === 'p' || e.key === 'P') {
                e.preventDefault();
                playPrev();
            }
        });

        // ========== 初始化 ==========
        renderPlaylist();
        if (playlist.length > 0) {
            audio.src = playlist[0].path;
            audio.load();
            updateUI(0);
            // 尝试自动播放
            setTimeout(() => {
                audio.play().catch(() => {});
            }, 300);
        }

        console.log('🎵 听松阁 · 琉璃乐坊 加载完成');
        console.log('📀 当前播放列表:', playlist.length, '首歌曲');
    </script>
