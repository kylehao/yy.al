<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>音乐·星际迷航</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0c10;
      background-image: url('https://img10.360buyimg.com/ddimg/jfs/t1/453252/16/14264/106854/6a37426aF81bc450f/00155a036eee5406.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            background-color: #111827;
            overflow: hidden;
            height: 100vh;
            padding: 20px;
    }
    /* ===== 卡片：霓虹赛博 ===== */
    .player-card {
      width: 600px;
      max-width: 94%;
      background: rgba(12, 15, 25, 0.65);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border-radius: 56px;
      padding: 28px 30px 24px;
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.15), inset 0 0 30px rgba(0, 255, 255, 0.05);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .player-card:hover {
      border-color: rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 70px rgba(0, 255, 255, 0.25);
    }
    /* 顶栏 */
    .top-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .cover-art {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
      background: #1a1f2e;
    }
    .cover-art img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .track-meta {
      flex: 1;
      min-width: 0;
    }
    .track-name {
      font-size: 20px; font-weight: 600; color: #f0f8ff;
      letter-spacing: -0.3px; text-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-artist {
      font-size: 14px; color: rgba(180, 240, 255, 0.7); margin-top: 2px;
    }
    .progress-area {
      display: flex; flex-direction: column; gap: 8px;
    }
    .progress-row {
      display: flex; align-items: center; gap: 12px;
    }
    .time {
      font-size: 13px; color: rgba(180, 240, 255, 0.5);
      font-variant-numeric: tabular-nums; min-width: 38px;
    }
    .progress-bar {
      flex: 1; height: 5px; background: rgba(0, 255, 255, 0.15);
      border-radius: 20px; cursor: pointer; position: relative;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.4);
      transition: height 0.2s;
    }
    .progress-bar:hover { height: 7px; }
    .progress-fill {
      width: 0%; height: 100%; background: linear-gradient(90deg, #00e5ff, #7b2ffc);
      border-radius: 20px; box-shadow: 0 0 20px #00e5ff;
      transition: width 0.05s linear;
    }
    .controls {
      display: flex; align-items: center; gap: 10px; margin-top: 4px;
    }
    .ctrl-btn {
      background: transparent; border: none; color: rgba(180, 240, 255, 0.6);
      cursor: pointer; padding: 6px; border-radius: 40px;
      transition: 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:hover { color: #fff; transform: scale(1.08); }
    .ctrl-btn:active { transform: scale(0.92); }
    .ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .play-btn svg { width: 34px; height: 34px; }
    .play-btn {
      background: rgba(0, 255, 255, 0.12);
      border-radius: 40px; padding: 2px 6px;
      border: 1px solid rgba(0, 255, 255, 0.15);
    }
    .play-btn:hover { background: rgba(0, 255, 255, 0.22); }
    .shuffle-btn.active { color: #00e5ff; filter: drop-shadow(0 0 12px #00e5ff); }
    /* 列表 */
    .playlist-section {
      border-top: 1px solid rgba(0, 255, 255, 0.08);
      padding-top: 16px;
    }
    .playlist-header {
      display: flex; justify-content: space-between;
      color: rgba(180, 240, 255, 0.4); font-size: 12px; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 10px;
    }
    .playlist {
      list-style: none; max-height: 180px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: rgba(0,255,255,0.2) transparent;
      padding-right: 4px;
    }
    .playlist::-webkit-scrollbar { width: 4px; }
    .playlist::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.2); border-radius: 12px; }
    .playlist li {
      display: flex; align-items: center; padding: 8px 12px;
      border-radius: 16px; cursor: pointer; color: rgba(200, 230, 255, 0.7);
      border: 1px solid transparent; margin-bottom: 2px;
      transition: 0.15s;
    }
    .playlist li:hover { background: rgba(0, 255, 255, 0.06); border-color: rgba(0,255,255,0.08); }
    .playlist li.active {
      background: rgba(0, 255, 255, 0.10);
      border-color: rgba(0, 255, 255, 0.25);
      color: #fff;
    }
    .playlist li .idx {
      font-size: 11px; color: rgba(180,240,255,0.25); min-width: 24px;
      text-align: right; margin-right: 12px;
    }
    .playlist li .info { flex: 1; overflow: hidden; }
    .playlist li .info .title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .playlist li .info .artist { font-size: 11px; color: rgba(180,240,255,0.4); }
    .playlist li .dur { font-size: 11px; color: rgba(180,240,255,0.25); margin-left: 8px; }
    .playlist li .play-indicator { opacity: 0; margin-left: 6px; color: #00e5ff; }
    .playlist li.active .play-indicator { opacity: 1; }
    .credit {
      text-align: center; font-size: 10px; color: rgba(180,240,255,0.15);
      border-top: 1px solid rgba(0,255,255,0.05); padding-top: 12px; margin-top: 6px;
    }
  </style>
</head>
<body>
<div class="player-card">
  <div class="top-section">
    <div class="cover-art"><img src="https://img12.360buyimg.com/ddimg/jfs/t1/463758/11/18904/23837/6a474a5bF2581a1f1/00151901907a00b7.jpg" alt="cover"></div>
    <div class="track-meta">
      <div class="track-name" id="trackName">夜航星</div>
      <div class="track-artist" id="trackArtist">不才</div>
    </div>
  </div>
  <div class="progress-area">
    <div class="progress-row">
      <span class="time" id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="time" id="totalTime">0:00</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="ctrl-btn play-btn" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="ctrl-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
      <button class="ctrl-btn shuffle-btn" id="shuffleBtn"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm0.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
    </div>
  </div>
  <div class="playlist-section">
    <div class="playlist-header"><span>✦ 星海歌单</span><span id="listCount">0 首</span></div>
    <ul class="playlist" id="playlistContainer"></ul>
  </div>
  <div class="credit">✦ 霓虹深空 · 沉浸听觉</div>
</div>
<script src="music.js"></script>
<script>
(function(){
  const raw = (typeof MUSIC_DATA !== 'undefined' && Array.isArray(MUSIC_DATA)) ? MUSIC_DATA : [];
  const playlist = raw.length ? raw : [
    {id:1,title:'夜航星',artist:'不才',src:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',duration:210},
    {id:2,title:'Lemon',artist:'米津玄師',src:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',duration:245},
    {id:3,title:'起风了',artist:'买辣椒也用券',src:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3',duration:238}
  ];
  const audio = new Audio();
  let current = 0, playing = false, dragging = false, shuffle = false;
  let shuffleHist = [], shuffleRemain = [];
  const $ = id => document.getElementById(id);
  const trackName = $('trackName'), trackArtist = $('trackArtist');
  const playBtn = $('playBtn'), playIcon = $('playIcon');
  const prevBtn = $('prevBtn'), nextBtn = $('nextBtn'), shuffleBtn = $('shuffleBtn');
  const progressFill = $('progressFill'), progressBar = $('progressBar');
  const currentTime = $('currentTime'), totalTime = $('totalTime');
  const container = $('playlistContainer'), listCount = $('listCount');

  function fmt(s){ if(isNaN(s)||s<0)return '0:00'; const m=Math.floor(s/60), sec=Math.floor(s%60); return m+':'+String(sec).padStart(2,'0'); }
  function loadTrack(index){
    const t = playlist[index]; if(!t) return;
    audio.src = t.src; audio.load();
    trackName.textContent = t.title; trackArtist.textContent = t.artist;
    totalTime.textContent = t.duration ? fmt(t.duration) : '0:00';
    progressFill.style.width='0%'; currentTime.textContent='0:00';
    highlight(index);
    if(playing) audio.play().catch(()=>{});
  }
  function highlight(index){
    [...container.children].forEach((li,i)=>li.classList.toggle('active',i===index));
  }
  function renderList(){
    container.innerHTML='';
    playlist.forEach((t,i)=>{
      const li=document.createElement('li');
      li.innerHTML=`
        <span class="idx">${String(i+1).padStart(2,'0')}</span>
        <div class="info"><div class="title">${t.title}</div><div class="artist">${t.artist}</div></div>
        <span class="dur">${t.duration?fmt(t.duration):'--:--'}</span>
        <span class="play-indicator">▶</span>
      `;
      li.addEventListener('click',()=>{ if(current===i && playing)return; current=i; if(shuffle)resetShuffle(); loadTrack(current); if(!playing){playing=true; updatePlayBtn(); audio.play().catch(()=>{});} else audio.play().catch(()=>{}); });
      container.appendChild(li);
    });
    listCount.textContent = playlist.length+' 首';
    highlight(current);
  }
  function updatePlayBtn(){ playIcon.innerHTML = playing ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>'; }
  function togglePlay(){
    if(!playlist.length) return;
    if(audio.paused){ audio.play().catch(()=>{}); playing=true; } else { audio.pause(); playing=false; }
    updatePlayBtn();
  }
  function resetShuffle(){
    const arr = Array.from({length:playlist.length},(_,i)=>i).filter(i=>i!==current);
    for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    shuffleRemain = arr; shuffleHist = [current];
  }
  function getNextShuffle(){
    if(!shuffleRemain.length) resetShuffle();
    const n = shuffleRemain.shift();
    if(n===current && shuffleRemain.length){ const alt=shuffleRemain.shift(); if(alt!==undefined){ shuffleRemain.unshift(n); return alt; } }
    return n;
  }
  function playNext(){
    if(!playlist.length) return;
    if(shuffle){ const idx=getNextShuffle(); if(idx===undefined)return; current=idx; loadTrack(current); if(!playing){playing=true; updatePlayBtn();} audio.play().catch(()=>{}); }
    else { current=(current+1)%playlist.length; loadTrack(current); if(!playing){playing=true; updatePlayBtn();} audio.play().catch(()=>{}); }
  }
  function playPrev(){
    if(!playlist.length) return;
    if(shuffle){
      if(shuffleHist.length>1){ shuffleHist.pop(); const idx=shuffleHist[shuffleHist.length-1]; if(idx!==undefined){ current=idx; loadTrack(current); if(!playing){playing=true; updatePlayBtn();} audio.play().catch(()=>{}); shuffleHist.push(current); return; } }
      current=(current-1+playlist.length)%playlist.length; loadTrack(current); if(!playing){playing=true; updatePlayBtn();} audio.play().catch(()=>{}); resetShuffle();
    } else { current=(current-1+playlist.length)%playlist.length; loadTrack(current); if(!playing){playing=true; updatePlayBtn();} audio.play().catch(()=>{}); }
  }
  function toggleShuffle(){ shuffle=!shuffle; shuffleBtn.classList.toggle('active',shuffle); if(shuffle) resetShuffle(); else { shuffleRemain=[]; shuffleHist=[]; } }

  playBtn.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', playPrev);
  nextBtn.addEventListener('click', playNext);
  shuffleBtn.addEventListener('click', toggleShuffle);
  audio.addEventListener('loadedmetadata', ()=>{ if(audio.duration && isFinite(audio.duration)) totalTime.textContent=fmt(audio.duration); });
  audio.addEventListener('timeupdate', ()=>{
    if(dragging) return;
    if(audio.duration && isFinite(audio.duration)){ const p=(audio.currentTime/audio.duration)*100; progressFill.style.width=p+'%'; currentTime.textContent=fmt(audio.currentTime); }
    else currentTime.textContent=fmt(audio.currentTime);
  });
  audio.addEventListener('ended', playNext);
  function handleProgress(e){
    const rect=progressBar.getBoundingClientRect(); const x=Math.min(1,Math.max(0,(e.clientX-rect.left)/rect.width));
    if(audio.duration && isFinite(audio.duration)){ const nt=x*audio.duration; audio.currentTime=nt; progressFill.style.width=x*100+'%'; currentTime.textContent=fmt(nt); }
  }
  progressBar.addEventListener('mousedown',(e)=>{ dragging=true; handleProgress(e); });
  window.addEventListener('mousemove',(e)=>{ if(dragging) handleProgress(e); });
  window.addEventListener('mouseup',()=>{ dragging=false; });
  progressBar.addEventListener('touchstart',(e)=>{ dragging=true; const t=e.touches[0]; handleProgress({clientX:t.clientX}); });
  progressBar.addEventListener('touchmove',(e)=>{ if(dragging){ const t=e.touches[0]; handleProgress({clientX:t.clientX}); } });
  progressBar.addEventListener('touchend',()=>{ dragging=false; });
  document.addEventListener('keydown',(e)=>{ if(e.code==='Space' && e.target.tagName!=='INPUT'){ e.preventDefault(); togglePlay(); } });

  renderList();
  if(playlist.length){ current=0; loadTrack(0); playing=false; updatePlayBtn(); audio.pause(); shuffleBtn.classList.remove('active'); shuffle=false; shuffleRemain=[]; shuffleHist=[]; }
})();
</script>
</body>
</html>
