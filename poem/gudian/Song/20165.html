 <div class="line">春风真解事，等闲吹遍，无数短长亭。<br></div><div class="line">一星星是恨，直送春归，替了落花声。 <br></div><div class="line">凭阑极目，荡春波、万种春情。<br></div><div class="line">应笑人舂粮几许？便要数征程。 <br></div><div class="line"><br></div><div class="line">冥冥，车轮落日，散绮余霞，渐都迷幻景。<br></div><div class="line">问收向红窗画箧，可算飘零？ <br></div><div class="line">相逢只有浮云好，奈蓬莱东指，弱水盈盈。<br></div><div class="line">休更惜，秋风吹老莼羹。</div>
